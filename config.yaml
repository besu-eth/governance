# besu-eth CLOWarden configuration
# Changes via PR to this repo; CLOWarden validates and reconciles.

teams:

  - name: contributors
    maintainers:
      - jframe
      - jflo
      - macfarla
      - kkaur01
    members:
      - <contributor1>
      - <contributor2>

  - name: maintainers
    maintainers:
      - jframe
      - jflo
      - macfarla
      - kkaur01
    members:
      - ahamlat
      - daniellehrner
      - diega
      - fab-10
      - gabriel-trintinalia
      - garyschulte
      - gfukushima
      - lu-pinto
      - lucassaldanha
      - Matilda-Clerke
      - matkt
      - matthew1001
      - mirgee
      - pinges
      - siladu
      - usmansaleem
    formation:
      - contributors         # maintainers inherits all contributors

  - name: org-admins
    maintainers:
      - jframe
      - jflo
      - macfarla
      - kkaur01
    members:
      - fab-10
      - garyschulte
      - matkt
      - siladu

  - name: lf-staff
    maintainers:
      - ryjones
    members:
      - SeanBohan
      - davidwboswell
      - hartm
      - jwagantall
      - thelinuxfoundation

  - name: security
    maintainers:
      - jframe
      - jflo
      - macfarla
      - kkaur01
    members:
      - fab-10
      - siladu
      - garyschulte

  - name: docs-maintainers
    maintainers:
      - jframe
      - jflo
      - macfarla
      - kkaur01
    members:
      - alexandratran
      - bgravenorst
      - joshuafernandes
      - m4sterbunny

repositories:

  # Core client — highest-value repo
  - name: besu
    teams:
      org-admins: admin
      maintainers: maintain
      contributors: triage

  # Native libraries (compiled crypto/perf deps)
  - name: besu-native
    teams:
      org-admins: admin
      maintainers: maintain
      contributors: triage

  # Static analysis / build tooling
  - name: besu-errorprone-checks
    teams:
      org-admins: admin
      maintainers: maintain
      contributors: triage

  # Documentation site
  - name: besu-docs
    teams:
      org-admins: admin
      maintainers: maintain
      docs-maintainers: maintain
      contributors: triage

  # Org governance (CLOWarden config lives here)
  - name: governance
    teams:
      org-admins: admin
      maintainers: maintain
      lf-staff: maintain
      # contributors intentionally excluded — governance changes are maintainer-only

  # Org-wide GitHub defaults (.github/FUNDING.yml, issue templates, etc.)
  - name: .github
    teams:
      org-admins: admin
      maintainers: maintain
      lf-staff: maintain

  # Wiki / knowledge base
  - name: wiki
    teams:
      org-admins: admin
      maintainers: maintain
      lf-staff: maintain
      docs-maintainers: write
      contributors: write

  # Homebrew tap for Besu
  - name: homebrew-besu
    teams:
      org-admins: admin
      maintainers: maintain

  # Security vulnerability tracking — restricted
  - name: vectors
    teams:
      org-admins: admin
      security: write
      # maintainers and contributors intentionally excluded
