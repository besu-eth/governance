repositories:

  # Core client — highest-value repo
  - name: besu
    teams:
      repo-admins: admin
      docs-maintainers: triage
      besu-maintainers: maintain
      besu-triage: triage
    visibility: public
  - name: besu-docs
    teams:
      repo-admins: admin
      docs-maintainers: admin
      besu-maintainers: maintain
      besu-triage: read
    visibility: public
  - name: besu-native
    teams:
      repo-admins: admin
      maintainers: maintain

  # Static analysis / build tooling
  - name: besu-errorprone-checks
    teams:
      repo-admins: admin
      maintainers: maintain

  # Org governance (CLOWarden config lives here)
  - name: governance
    teams:
      repo-admins: admin
      maintainers: maintain
      lf-staff: maintain
      # contributors intentionally excluded — governance changes are maintainer-only

  # Org-wide GitHub defaults (.github/FUNDING.yml, issue templates, etc.)
  - name: .github
    teams:
      org-admins: admin
      maintainers: maintain
      lf-staff: maintain

  # Wiki / knowledge base
  - name: wiki
    teams:
      repo-admins: admin
      maintainers: maintain
      lf-staff: maintain
      docs-maintainers: write

  # Homebrew tap for Besu
  - name: homebrew-besu
    teams:
      repo-admins: admin
      maintainers: maintain

  # Security vulnerability tracking — restricted
  - name: vectors
    visibility: private
    teams:
      org-admins: admin
      security: write
      # maintainers and contributors intentionally excluded
